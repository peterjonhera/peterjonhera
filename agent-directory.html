<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Directory – Secret to Health</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #2d3748;
    --accent: #38b2ac;
    --accent2: #81e6d9;
    --gold: #f6ad55;
    --text: #e2e8f0;
    --muted: #718096;
    --tag-bg: #1a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0d2626 0%, #0d1117 60%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--accent2);
    letter-spacing: -0.5px;
    margin-bottom: 0.2rem;
  }

  .brand span { color: var(--gold); }

  .tagline {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 1.2rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem 0.8rem 2.8rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,178,172,0.15);
  }

  #search::placeholder { color: var(--muted); }

  .stats {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .stat {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .stat strong {
    color: var(--accent2);
    font-weight: 600;
  }

  /* Main */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* Head Office */
  .head-office {
    background: linear-gradient(135deg, var(--tag-bg), #1a2a2a);
    border: 1.5px solid var(--accent);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1.8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-start;
  }

  .head-office-badge {
    background: var(--accent);
    color: #0d1117;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    margin-bottom: 0.4rem;
    display: inline-block;
  }

  .head-office-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent2);
  }

  .head-office-details { flex: 1; min-width: 180px; }
  .head-office-details p { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

  .ho-phone {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    font-size: 0.9rem;
    color: var(--accent2);
    text-decoration: none;
    font-weight: 500;
    margin-top: 0.5rem;
    transition: background 0.2s;
  }

  .ho-phone:hover { background: var(--tag-bg); }

  /* Region sections */
  .region-block {
    margin-bottom: 1.2rem;
  }

  .region-header {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .region-header .count {
    background: var(--surface2);
    color: var(--accent);
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: 0;
  }

  /* Agent cards grid */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.6rem;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }

  .agent-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .agent-name {
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--text);
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }

  .agent-location {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .agent-phone {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: var(--accent2);
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: color 0.2s;
  }

  .agent-phone:hover { color: white; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    display: none;
  }

  .no-results .emoji { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .no-results p { font-size: 0.9rem; }

  /* Highlight match */
  mark {
    background: rgba(56,178,172,0.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .agents-grid { grid-template-columns: 1fr; }
    .head-office { flex-direction: column; }
  }
</style>
</head>

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function render(query = '') {
  const q = query.toLowerCase().trim();
  const dir = document.getElementById('directory');
  const noResults = document.getElementById('no-results');

  // Group agents
  const regionMap = {};
  let totalVisible = 0;

  agents.forEach(a => {
    const matches = !q ||
      a.name.toLowerCase().includes(q) ||
      a.location.toLowerCase().includes(q) ||
      a.phone.replace(/\s/g,'').includes(q.replace(/\s/g,'')) ||
      a.region.toLowerCase().includes(q);

    if (!matches) return;
    totalVisible++;
    if (!regionMap[a.region]) regionMap[a.region] = [];
    regionMap[a.region].push(a);
  });

  // Head office visibility
  const ho = document.getElementById('head-office');
  if (q && !['head','office','roben','harare cbd','0773811793'].some(k => k.includes(q) || q.includes(k.split(' ')[0]))) {
    ho.style.display = totalVisible === 0 ? 'none' : 'flex';
  } else {
    ho.style.display = 'flex';
  }

  document.getElementById('visible-count').textContent = totalVisible;
  document.getElementById('region-count').textContent = Object.keys(regionMap).length;

  if (totalVisible === 0) {
    dir.innerHTML = '';
    noResults.style.display = 'block';
    document.getElementById('search-term').textContent = query;
    return;
  }
  noResults.style.display = 'none';

  const sorted = Object.keys(regionMap).sort((a,b) => {
    // Special roles first
    if (a === 'Special Roles') return -1;
    if (b === 'Special Roles') return 1;
    return a.localeCompare(b);
  });

  dir.innerHTML = sorted.map(region => {
    const agentsHtml = regionMap[region].map(a => `
      <div class="agent-card">
        <div class="agent-name">${highlight(a.name, query)}</div>
        <div class="agent-location">${highlight(a.location, query)}</div>
        ${a.phone ? `<a class="agent-phone" href="tel:${a.phone}">📞 ${highlight(a.phone, query)}</a>` : ''}
      </div>
    `).join('');

    return `
      <div class="region-block">
        <div class="region-header">
          ${highlight(region, query)}
          <span class="count">${regionMap[region].length}</span>
        </div>
        <div class="agents-grid">${agentsHtml}</div>
      </div>
    `;
  }).join('');
}

document.getElementById('search').addEventListener('input', e => {
  render(e.target.value);
});
